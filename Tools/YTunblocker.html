<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../Images/Favicon.png">
    <meta charset="UTF-8">
    <title>RetroPixel | YouTube Unblocker</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #f5f5ff;
            background: radial-gradient(circle at top, #2b1b5a 0, #050510 45%, #02030a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* GRID OVERLAY */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .grid-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 0, rgba(0, 255, 255, 0.18), transparent 55%),
                        radial-gradient(circle at 90% 100%, rgba(255, 0, 200, 0.18), transparent 55%);
            mix-blend-mode: screen;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(14px);
            background: linear-gradient(to right, rgba(5, 5, 20, 0.9), rgba(10, 5, 40, 0.9));
            border-bottom: 1px solid rgba(180, 120, 255, 0.35);
            box-shadow: 0 0 25px rgba(120, 80, 255, 0.35);
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .logo {
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 1.05rem;
            color: #ffffff;
        }

        .logo span { color: #ff6bff; }

        #clock {
            font-size: 0.9rem;
            color: #d7d7ff;
            letter-spacing: 0.05em;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            color: #d7d7ff;
            position: relative;
            padding-bottom: 3px;
            transition: color 0.2s ease;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0; bottom: 0;
            width: 0; height: 2px;
            background: linear-gradient(90deg, #00f5ff, #ff6bff);
            transition: width 0.2s ease;
        }

        nav a:hover { color: #ffffff; }
        nav a:hover::after { width: 100%; }

        /* MAIN */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 120px 22px 80px;
            position: relative;
            z-index: 2;
        }

        .page-title {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.35);
        }

        .section {
            background: rgba(5, 5, 25, 0.9);
            border: 1px solid rgba(180, 120, 255, 0.35);
            border-radius: 14px;
            padding: 22px 22px 24px;
            margin-bottom: 30px;
            box-shadow: 0 0 18px rgba(40, 20, 90, 0.6);
        }

        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .section p {
            font-size: 0.9rem;
            color: #cfcfff;
            margin-bottom: 14px;
        }

        #youtubeLink {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 14px;
        }

        #embedButton {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            background: linear-gradient(90deg, #00f5ff, #ff6bff);
            color: #000;
            transition: opacity 0.15s ease, transform 0.1s ease;
        }

        #embedButton:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        #videoContainer {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        #videoContainer iframe {
            max-width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(180, 120, 255, 0.5);
            box-shadow: 0 0 20px rgba(120, 80, 255, 0.6);
        }

        #historyContainer {
            margin-top: 30px;
        }

        #historyContainer h2 {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        #historyItems {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
        }

        .historyItem {
            padding: 8px 10px;
            background: radial-gradient(circle at top left, rgba(0, 245, 255, 0.12), transparent 55%),
                        radial-gradient(circle at bottom right, rgba(255, 107, 255, 0.12), transparent 55%),
                        rgba(10, 10, 35, 0.95);
            border: 1px solid rgba(0, 245, 255, 0.4);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #e5e5ff;
            text-align: left;
            transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
            word-break: break-all;
        }

        .historyItem:hover {
            background: rgba(0, 245, 255, 0.18);
            box-shadow: 0 0 16px rgba(0, 245, 255, 0.6);
            transform: translateY(-1px);
        }

        #githubLink {
            display: inline-block;
            margin-top: 20px;
            color: #00f5ff;
            text-decoration: none;
            font-size: 0.9rem;
        }

        #githubLink:hover {
            text-decoration: underline;
        }

        .error {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #ff8080;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="grid-overlay"></div>

<header>
    <div class="nav-inner">
        <div class="logo">Retro<span>Pixel</span></div>
        <div id="clock"></div>

        <nav>
            <a href="../index.html">Home</a>
<a href="../Games.html">Games</a>
<a href="../Tools.html">Tools</a>
<a href="../Forms.html">Forms</a>
<a href="../Changelog.html">Changelog</a>

        </nav>
    </div>
</header>

<main>
    <div class="page-title">YouTube Unblocker</div>

    <div class="section">
        <h2>Embed a YouTube Video</h2>
        <p>Paste a full YouTube link (like <code>https://www.youtube.com/watch?v=...</code>) and we’ll load the embedded player.</p>

        <input type="text" id="youtubeLink" placeholder="Enter YouTube Link">
        <button id="embedButton" onclick="embedVideo()">Unblock Video</button>
        <div id="errorMessage" class="error"></div>

        <div id="videoContainer"></div>
    </div>

    <div class="section" id="historyContainer">
        <h2>History</h2>
        <p>Click a previous link to load it again.</p>
        <div id="historyItems"></div>
    </div>

    
</main>

<script>
let currentIframe = null;

function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const date = now.toLocaleDateString();
    document.getElementById("clock").textContent = `${date} • ${time}`;
}
setInterval(updateClock, 1000);
updateClock();

function embedVideo() {
    const youtubeLink = document.getElementById("youtubeLink").value.trim();
    const videoContainer = document.getElementById("videoContainer");
    const historyContainer = document.getElementById("historyItems");
    const errorMessage = document.getElementById("errorMessage");

    errorMessage.textContent = "";

    if (!youtubeLink) {
        errorMessage.textContent = "Please enter a YouTube link.";
        return;
    }

    if (youtubeLink.includes("youtube.com") && youtubeLink.includes("watch?v=")) {
        const parts = youtubeLink.split("watch?v=");
        if (parts.length >= 2) {
            let videoId = parts[1];

            // Strip extra params if present (&t=, &ab_channel=, etc.)
            const ampIndex = videoId.indexOf("&");
            if (ampIndex !== -1) {
                videoId = videoId.substring(0, ampIndex);
            }

            const embedSrc = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
            const iframe = createIframe(embedSrc);

            if (currentIframe) {
                videoContainer.removeChild(currentIframe);
            }

            videoContainer.appendChild(iframe);
            currentIframe = iframe;

            const historyItem = document.createElement("div");
            historyItem.className = "historyItem";
            historyItem.textContent = youtubeLink;
            historyItem.onclick = function () {
                loadFromHistory(youtubeLink);
            };
            historyContainer.appendChild(historyItem);
        } else {
            errorMessage.textContent = "Invalid YouTube link format.";
        }
    } else {
        errorMessage.textContent = "Not a valid YouTube watch link.";
    }
}

function loadFromHistory(link) {
    const videoContainer = document.getElementById("videoContainer");
    const parts = link.split("watch?v=");
    if (parts.length >= 2) {
        let videoId = parts[1];
        const ampIndex = videoId.indexOf("&");
        if (ampIndex !== -1) {
            videoId = videoId.substring(0, ampIndex);
        }
        const embedSrc = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
        const iframe = createIframe(embedSrc);

        if (currentIframe) {
            videoContainer.removeChild(currentIframe);
        }
        videoContainer.appendChild(iframe);
        currentIframe = iframe;
    }
}

function createIframe(src) {
    const iframe = document.createElement("iframe");
    iframe.src = src;
    iframe.width = "800";
    iframe.height = "450";
    iframe.allowFullscreen = true;
    iframe.frameBorder = "0";
    iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
    return iframe;
}
</script>

</body>
</html>
