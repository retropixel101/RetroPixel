<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RetroNebula | Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #f5f5ff;
            background: radial-gradient(circle at top, #2b1b5a 0, #050510 45%, #02030a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background grid */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .grid-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 0, rgba(0, 255, 255, 0.18), transparent 55%),
                        radial-gradient(circle at 90% 100%, rgba(255, 0, 200, 0.18), transparent 55%);
            mix-blend-mode: screen;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(14px);
            background: linear-gradient(to right, rgba(5, 5, 20, 0.9), rgba(10, 5, 40, 0.9));
            border-bottom: 1px solid rgba(180, 120, 255, 0.35);
            box-shadow: 0 0 25px rgba(120, 80, 255, 0.35);
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .logo {
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 1.05rem;
            color: #ffffff;
        }

        .logo span {
            color: #ff6bff;
        }

        /* Center clock */
        #clock {
            font-size: 0.9rem;
            color: #d7d7ff;
            letter-spacing: 0.05em;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            color: #d7d7ff;
            position: relative;
            padding-bottom: 3px;
            transition: color 0.2s ease;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00f5ff, #ff6bff);
            transition: width 0.2s ease;
        }

        nav a:hover {
            color: #ffffff;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Page Title */
        .page-title {
            max-width: 1100px;
            margin: 40px auto 10px;
            padding: 0 22px;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00f5ff, #ff6bff);
            -webkit-background-clip: text;
            color: transparent;
        }

        /* Games Grid */
        .games-grid {
            max-width: 1100px;
            margin: 20px auto 80px;
            padding: 0 22px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 22px;
        }

        .game-card {
            background: rgba(10, 10, 25, 0.85);
            border: 1px solid rgba(180, 120, 255, 0.35);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 0 18px rgba(40, 20, 90, 0.6);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 26px rgba(255, 107, 255, 0.45);
        }

        .game-thumb {
            width: 100%;
            height: 130px;
            background: linear-gradient(135deg, #00f5ff55, #ff6bff55);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .game-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .play-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: linear-gradient(90deg, #00f5ff, #ff6bff);
            color: #050510;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: filter 0.15s ease;
        }

        .play-btn:hover {
            filter: brightness(1.1);
        }

        /* Popup overlay */
        #popup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            animation: fadeIn 0.25s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #popup-box {
            background: rgba(15, 10, 35, 0.95);
            border: 1px solid rgba(255, 120, 255, 0.35);
            padding: 22px;
            border-radius: 12px;
            width: 280px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 120, 255, 0.35);
            position: relative;
            animation: popupIn 0.25s ease forwards;
        }

        @keyframes popupIn {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }

        #popup-close {
            position: absolute;
            top: 6px;
            right: 10px;
            font-size: 18px;
            color: #ff4b4b;
            cursor: pointer;
            font-weight: bold;
        }

        .popup-btn {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            background: linear-gradient(90deg, #00f5ff, #ff6bff);
            color: #050510;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
        }

        .popup-btn:hover {
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>

    <header>
        <div class="nav-inner">
            <div class="logo">Retro<span>Nebula</span></div>

            <div id="clock"></div>

            <nav>
                <a href="index.html">Home</a>
                <a href="games.html">Games</a>
                <a href="#">Tools</a>
                <a href="#">Forms</a>
                <a href="#">Changelog</a>
            </nav>
        </div>
    </header>

    <h1 class="page-title">Games</h1>

    <section class="games-grid">

        <div class="game-card">
            <div class="game-thumb"></div>
            <div class="game-title">Nut Simulator</div>
            <button class="play-btn" onclick="openPopup('https://retropixel101.github.io/Nut-Sim/')">Play</button>
        </div>

        <div class="game-card">
            <div class="game-thumb"></div>
            <div class="game-title">Placeholder Game 2</div>
            <button class="play-btn" onclick="openPopup('https://example.com')">Play</button>
        </div>

        <div class="game-card">
            <div class="game-thumb"></div>
            <div class="game-title">Placeholder Game 3</div>
            <button class="play-btn" onclick="openPopup('https://example.com')">Play</button>
        </div>

        <div class="game-card">
            <div class="game-thumb"></div>
            <div class="game-title">Placeholder Game 4</div>
            <button class="play-btn" onclick="openPopup('https://example.com')">Play</button>
        </div>

        <div class="game-card">
            <div class="game-thumb"></div>
            <div class="game-title">Placeholder Game 5</div>
            <button class="play-btn" onclick="openPopup('https://example.com')">Play</button>
        </div>

    </section>

    <!-- Popup -->
    <div id="popup">
        <div id="popup-box">
            <div id="popup-close" onclick="closePopup()">✕</div>
            <h3 style="margin-bottom:10px;">Open Game</h3>
            <button class="popup-btn" onclick="openInNewTab()">Open in New Tab</button>
            <button class="popup-btn" onclick="openInNewWindow()">Open in New Window</button>
        </div>
    </div>

    <script>
        let currentGameURL = "";

        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const date = now.toLocaleDateString();
            document.getElementById("clock").textContent = `${date} • ${time}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function openPopup(url) {
            currentGameURL = url;
            document.getElementById("popup").style.display = "flex";
        }

        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }

        function openInNewTab() {
            window.open(currentGameURL, "_blank");
            closePopup();
        }

        function openInNewWindow() {
            const win = window.open("", "", "width=1100,height=700,resizable=yes,scrollbars=yes");
            win.document.write(`
                <style>
                    body { margin:0; background:#000; overflow:hidden; }
                    iframe { border:0; width:100vw; height:100vh; }
                </style>
                <iframe src="${currentGameURL}"></iframe>
            `);
            closePopup();
        }
    </script>

</body>
</html>
