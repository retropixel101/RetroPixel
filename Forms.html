<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="Images/Favicon.png">
    <meta charset="UTF-8">
    <title>RetroPixel | Forms</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #f5f5ff;
            background: radial-gradient(circle at top, #2b1b5a 0, #050510 45%, #02030a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* GRID OVERLAY */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .grid-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 0, rgba(0, 255, 255, 0.18), transparent 55%),
                        radial-gradient(circle at 90% 100%, rgba(255, 0, 200, 0.18), transparent 55%);
            mix-blend-mode: screen;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(14px);
            background: linear-gradient(to right, rgba(5, 5, 20, 0.9), rgba(10, 5, 40, 0.9));
            border-bottom: 1px solid rgba(180, 120, 255, 0.35);
            box-shadow: 0 0 25px rgba(120, 80, 255, 0.35);
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .logo {
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 1.05rem;
            color: #ffffff;
        }

        .logo span { color: #ff6bff; }

        #clock {
            font-size: 0.9rem;
            color: #d7d7ff;
            letter-spacing: 0.05em;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            color: #d7d7ff;
            position: relative;
            padding-bottom: 3px;
            transition: color 0.2s ease;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0; bottom: 0;
            width: 0; height: 2px;
            background: linear-gradient(90deg, #00f5ff, #ff6bff);
            transition: width 0.2s ease;
        }

        nav a:hover { color: #ffffff; }
        nav a:hover::after { width: 100%; }

        /* MAIN CONTENT */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 120px 22px 80px;
            position: relative;
            z-index: 2;
        }

        .page-title {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.35);
        }

        .forms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .form-card {
            background: radial-gradient(circle at top left, rgba(0, 245, 255, 0.12), transparent 55%),
                        radial-gradient(circle at bottom right, rgba(255, 107, 255, 0.12), transparent 55%),
                        rgba(5, 5, 25, 0.9);
            border: 1px solid rgba(180, 120, 255, 0.35);
            box-shadow: 0 0 18px rgba(40, 20, 90, 0.6);
            border-radius: 14px;
            padding: 18px 20px;
            text-decoration: none;
            color: #fff;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .form-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 26px rgba(255, 107, 255, 0.55);
        }

        .form-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .form-desc {
            font-size: 0.85rem;
            color: #cfcfff;
            line-height: 1.5;
        }
    </style>
</head>

<body>

<div class="grid-overlay"></div>

<header>
    <div class="nav-inner">
        <div class="logo">Retro<span>Pixel</span></div>

        <div id="clock"></div>

        <nav>
            <a href="index.html">Home</a>
            <a href="Games.html">Games</a>
            <a href="Tools.html">Tools</a>
            <a href="Forms.html">Forms</a>
            <a href="Changelog.html">Changelog</a>
        </nav>
    </div>
</header>

<main>
    <div class="page-title">Forms</div>

    <div class="forms-grid">

        <a class="form-card" href="https://docs.google.com/forms/d/e/1FAIpQLSeH4U4RI3EoNmfQKXqHMBKHgR7pUKIlsNrz0yfGtuYuRZ5v0A/viewform?usp=dialog" target="_blank">
            <div class="form-title">Bug Report</div>
            <div class="form-desc">Report issues, broken games, or anything that needs fixing.</div>
        </a>

        <a class="form-card" href="https://docs.google.com/forms/d/e/1FAIpQLSe2GvupG294lQVddjxjXtoVNdn9Mj7T96_Icq_DO3L7mBoS5w/viewform?usp=dialog" target="_blank">
            <div class="form-title">Game Request</div>
            <div class="form-desc">Request new games to be added to RetroPixel.</div>
        </a>

    </div>
</main>

<script>
function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const date = now.toLocaleDateString();
    document.getElementById("clock").textContent = `${date} • ${time}`;
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
