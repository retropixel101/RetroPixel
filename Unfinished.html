<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="Images/Favicon.png">
    <meta charset="UTF-8">
    <title>RetroPixel | Unfinished</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #f5f5ff;
            background: radial-gradient(circle at top, #2b1b5a 0, #050510 45%, #02030a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* GRID OVERLAY */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .grid-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 0, rgba(0, 255, 255, 0.18), transparent 55%),
                        radial-gradient(circle at 90% 100%, rgba(255, 0, 200, 0.18), transparent 55%);
            mix-blend-mode: screen;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(14px);
            background: linear-gradient(to right, rgba(5, 5, 20, 0.9), rgba(10, 5, 40, 0.9));
            border-bottom: 1px solid rgba(180, 120, 255, 0.35);
            box-shadow: 0 0 25px rgba(120, 80, 255, 0.35);
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .logo {
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 1.05rem;
            color: #ffffff;
        }

        .logo span {
            color: #ff6bff;
        }

        /* Center clock */
        #clock {
            font-size: 0.9rem;
            color: #d7d7ff;
            letter-spacing: 0.05em;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            color: #d7d7ff;
            position: relative;
            padding-bottom: 3px;
            transition: color 0.2s ease;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00f5ff, #ff6bff);
            transition: width 0.2s ease;
        }

        nav a:hover {
            color: #ffffff;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* CENTER MESSAGE */
        .center-box {
            position: relative;
            z-index: 2;
            margin-top: 140px;
            height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .center-box h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
        }

        .emoji {
            font-size: 90px;
            margin-top: 25px;
            opacity: 0.95;
        }
    </style>
</head>

<body>

    <div class="grid-overlay"></div>

    <header>
        <div class="nav-inner">
            <div class="logo">Retro<span>Pixel</span></div>

            <div id="clock"></div>

            <nav>
                <a href="index.html">Home</a>
                <a href="Games.html">Games</a>
                <a href="Tools.html">Tools</a>
                <a href="Forms.html">Forms</a>
                <a href="Changelog.html">Changelog</a>
            </nav>
        </div>
    </header>

    <div class="center-box">
        <h1>Sorry this area isn't finished!</h1>
        <div class="emoji">⚠️</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const date = now.toLocaleDateString();
            document.getElementById("clock").textContent = `${date} • ${time}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
