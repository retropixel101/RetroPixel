<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetroNebula — Coming Soon</title>

    <style>
        /* --- GLOBAL --- */
        body {
            margin: 0;
            background: linear-gradient(180deg, #0a0a0f 0%, #050508 100%);
            font-family: "Segoe UI", sans-serif;
            color: #e6e6ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- TOP NAV BAR (RetroNebula Accurate) --- */
        header {
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 20;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-inner {
            width: 92%;
            max-width: 1250px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        /* Logo */
        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            color: white;
            user-select: none;
        }
        .logo span {
            color: #ff4fd8;
        }

        /* Clock (centered) */
        #clock {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: #cfcfff;
            opacity: 0.85;
            pointer-events: none;
            user-select: none;
        }

        /* Nav links */
        nav a {
            margin-left: 26px;
            text-decoration: none;
            color: #cfcfff;
            font-size: 15px;
            transition: 0.2s;
        }
        nav a:hover {
            color: white;
        }

        /* --- CENTER MESSAGE --- */
        .content {
            margin-top: 140px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .content h1 {
            font-size: 46px;
            font-weight: 700;
            margin: 0;
            color: white;
            text-shadow: 0 0 14px rgba(255, 255, 255, 0.35);
        }

        .emoji {
            font-size: 90px;
            margin-top: 30px;
            opacity: 0.95;
        }
    </style>
</head>

<body>

<header>
    <div class="nav-inner">
        <div class="logo">Retro<span>Pixel</span></div>

        <div id="clock"></div>

        <nav>
            <a href="/">Home</a>
            <a href="/games">Games</a>
            <a href="/tools">Tools</a>
            <a href="/forms">Forms</a>
            <a href="/changelog">Changelog</a>
        </nav>
    </div>
</header>

<div class="content">
    <h1>Sorry this area isn't finished!</h1>
    <div class="emoji">⚠️</div>
</div>

<script>
function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const date = now.toLocaleDateString();
    document.getElementById("clock").textContent = `${date} • ${time}`;
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
